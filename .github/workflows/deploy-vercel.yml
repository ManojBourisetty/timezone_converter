name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:
  schedule:
    # Auto-retry deployment windows in case Vercel hobby quota blocked a prior push run.
    - cron: '17 */4 * * *'

concurrency:
  group: deploy-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    defaults:
      run:
        working-directory: frontend

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_FALLBACK_ORG_ID: ${{ secrets.VERCEL_FALLBACK_ORG_ID }}
      VERCEL_FALLBACK_PROJECT_ID: ${{ secrets.VERCEL_FALLBACK_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: ${{ github.workspace }}
        run: pip install -r backend/requirements.txt

      - name: Run backend security scan
        working-directory: ${{ github.workspace }}
        continue-on-error: true
        run: bandit -r backend/ -f txt -ll

      - name: Run backend tests
        working-directory: ${{ github.workspace }}
        run: python -m pytest tests/ -v

      - name: Run frontend tests
        run: npm test -- --watchAll=false --runInBand

      - name: Build app
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy with quota-aware retry and fallback profile
        env:
          PRIMARY_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          FALLBACK_VERCEL_TOKEN: ${{ secrets.VERCEL_FALLBACK_TOKEN }}
        run: |
          set -euo pipefail

          deploy_target() {
            local profile_name="$1"
            local token="$2"
            local org_id="$3"
            local project_id="$4"

            if [[ -z "$token" || -z "$org_id" || -z "$project_id" ]]; then
              echo "Skipping ${profile_name}: missing token/org/project configuration"
              return 2
            fi

            echo "--- Deploying with ${profile_name} profile ---"

            export VERCEL_ORG_ID="$org_id"
            export VERCEL_PROJECT_ID="$project_id"

            VERCEL_ORG_ID="$org_id" VERCEL_PROJECT_ID="$project_id" \
              vercel pull --yes --environment=production --token="$token"

            VERCEL_ORG_ID="$org_id" VERCEL_PROJECT_ID="$project_id" \
              vercel build --prod --token="$token"

            local attempt=1
            local max_attempts=3
            local deploy_log
            deploy_log="$(mktemp)"

            while [[ "$attempt" -le "$max_attempts" ]]; do
              echo "${profile_name} deploy attempt ${attempt}/${max_attempts}"

              set +e
              VERCEL_ORG_ID="$org_id" VERCEL_PROJECT_ID="$project_id" \
                vercel deploy --prebuilt --prod --token="$token" 2>&1 | tee "$deploy_log"
              local exit_code=${PIPESTATUS[0]}
              set -e

              if [[ "$exit_code" -eq 0 ]]; then
                echo "${profile_name} deployment succeeded"
                return 0
              fi

              if grep -q 'api-deployments-young-hobby-team-24h' "$deploy_log"; then
                echo "${profile_name} hit Vercel 24h quota"
                if [[ "$attempt" -lt "$max_attempts" ]]; then
                  echo "Quota retry backoff (60s) before next attempt"
                  sleep 60
                fi
              else
                echo "${profile_name} failed for non-quota reason"
                return 1
              fi

              attempt=$((attempt + 1))
            done

            echo "${profile_name} exhausted retries due to quota"
            return 3
          }

          primary_result=0
          fallback_result=2

          set +e
          deploy_target "primary" "$PRIMARY_VERCEL_TOKEN" "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID"
          primary_result=$?
          set -e

          if [[ "$primary_result" -eq 0 ]]; then
            exit 0
          fi

          echo "Primary profile did not deploy successfully (code: ${primary_result}). Attempting fallback profile."

          set +e
          deploy_target "fallback" "$FALLBACK_VERCEL_TOKEN" "$VERCEL_FALLBACK_ORG_ID" "$VERCEL_FALLBACK_PROJECT_ID"
          fallback_result=$?
          set -e

          if [[ "$fallback_result" -eq 0 ]]; then
            exit 0
          fi

          echo "Deployment failed on both profiles."
          echo "A scheduled run retries every 4 hours; if this was quota-based, deployment will resume automatically after reset."
          exit 1