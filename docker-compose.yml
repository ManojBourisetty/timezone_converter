version: '3.8'

services:
  # MongoDB Local Development
  mongodb:
    image: mongo:7.0
    container_name: timezone-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: timezone_converter
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timezone-api
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/timezone_converter
      - DB_NAME=timezone_converter
      - ALLOWED_ORIGINS=http://localhost:3000
      - HOST=0.0.0.0
      - PORT=8001
      - DEBUG=True
      - LOG_LEVEL=DEBUG
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m uvicorn server:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend (for development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: timezone-web
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
      - REACT_APP_ENVIRONMENT=development
      - REACT_APP_DEBUG=true
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm start

volumes:
  mongo_data:

networks:
  default:
    name: timezone-network
